<!DOCTYPE html>
<!--
    Network Monitor Dashboard
    - Status tab shows monitored hosts, current status, failures and latency.
    - Logs tab shows recent error/warning messages.
    - Add Target tab allows adding targets (removal is done via the red × on Status rows).
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Network Monitor Dashboard</title>
<style>
/* simplified, minimal styling */
body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 0;
    background: white;
    color: #000;
}
header {
    padding: 10px;
    text-align: center;
    font-weight: bold;
    font-size: 1.5rem;
    border-bottom: 1px solid #ccc;
}
main {
    padding: 10px;
    max-width: 900px;
    margin: auto;
}
.tabs {
    display: flex;
    gap: 5px;
    margin-bottom: 10px;
}
.tab {
    padding: 8px;
    cursor: pointer;
    border: 1px solid #ccc;
    background: #e0e0e0;
    border-radius: 3px 3px 0 0;
}
.tab.active {
    background: #fff;
    border-bottom: 1px solid #fff;
}
.tab-content {
    border: 1px solid #ccc;
    padding: 10px;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th,
td {
    padding: 8px;
    border: 1px solid #ccc;
    text-align: left;
}
tr:nth-child(even) {
    background: #f9f9f9;
}
.status-up { color: green; }
.status-down { color: red; }
.status-warning { color: orange; }
#logContainer {
    max-height: 400px;
    overflow-y: auto;
    font-family: monospace;
    white-space: pre-wrap;
}
.delete-btn {
    font-size: 16px;
    color: red;
    background: none;
    border: none;
    cursor: pointer;
}
form input {
    padding: 4px;
    margin-right: 4px;
}
.form-row input {
    flex: 1;
}
form button {
    padding: 4px 8px;
}

.hidden { display: none; }
.form-row { display: flex; gap: 8px; align-items: center; }
.result { margin-top: 8px; color: #333; }
</style>
</head>
<body>

<header>Network Monitor Dashboard</header>

<main>
    <div class="tabs">
        <div class="tab active" onclick="showTab('status', this)">Status</div>
        <div class="tab" onclick="showTab('logs', this)">Logs</div>
        <div class="tab" onclick="showTab('add', this)">Add Target</div>
    </div>

    <div id="status" class="tab-content">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Status</th>
                    <th>Failures</th>
                    <th>Latency</th>
                    <th>Last Checked</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="statusTable"></tbody>
        </table>
    </div>

    <div id="logs" class="tab-content hidden">
        <div id="logContainer">Loading logs...</div>
    </div>

    <div id="add" class="tab-content hidden">
        <h3>Add Monitoring Target</h3>
        <form id="addForm" onsubmit="event.preventDefault(); submitTarget();">
            <div class="form-row">
                <input id="targetName" placeholder="Name (optional)" />
                <input id="targetAddress" placeholder="IP or hostname" required />
                <button type="submit">Add</button>
            </div>
        </form>
        <div id="addResult" class="result">&nbsp;</div>
    </div>
</main>

<script>
function showTab(name, el) {
    ['status','logs','add'].forEach(id => {
        const elNode = document.getElementById(id);
        if (elNode) {
            if (id === name) elNode.classList.remove('hidden');
            else elNode.classList.add('hidden');
        }
    });
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (el) el.classList.add('active');
}

async function loadStatus() {
    try {
        const res = await fetchWithKey('/api/status');
        const data = await res.json();
        const table = document.getElementById('statusTable');
        table.innerHTML = '';
            data.forEach(host => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${host.name || ''}</td>
                <td>${host.address || ''}</td>
                    <td class="${host.isUp ? 'status-up' : (host.severity === 'Critical' ? 'status-down' : 'status-warning')}">${host.isUp ? 'UP' : (host.severity === 'Critical' ? 'CRITICAL' : (host.severity === 'Warning' ? 'WARNING' : 'DOWN'))}</td>
                    <td>${host.failureCount ?? 0}</td>
                    <td>${host.latency >= 0 ? host.latency + ' ms' : 'N/A'}</td>
                    <td>${new Date(host.lastChecked).toLocaleTimeString()}</td>
                    <td class="action-cell"><button class="delete-btn" onclick="deleteTarget('${host.address}', this)">×</button></td>
            `;
            table.appendChild(row);
        });
    } catch(e){console.error(e);}
}

async function loadLogs() {
    try {
        const res = await fetchWithKey('/api/logs');
        const logs = await res.json();
        document.getElementById('logContainer').textContent = logs.join("\n") || "No errors";
    } catch(e){console.error(e);}
}

// Refresh every 3 seconds
setInterval(loadStatus, 3000);
setInterval(loadLogs, 3000);
window.onload = ()=>{loadStatus(); loadLogs();}

async function submitTarget() {
    const name = document.getElementById('targetName').value.trim();
    const address = document.getElementById('targetAddress').value.trim();
    const result = document.getElementById('addResult');
    if (!address) { result.textContent = 'Address is required'; return; }
    try {
        const res = await fetchWithKey('/api/targets', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, address: address })
        });
        if (res.status === 201) {
            result.style.color = 'green';
            result.textContent = 'Target added';
            document.getElementById('addForm').reset();
            loadStatus();
        } else if (res.status === 409) {
            result.style.color = 'orange';
            result.textContent = 'Target already exists';
        } else {
            const txt = await res.text();
            result.style.color = 'red';
            result.textContent = 'Error: ' + txt;
        }
    } catch (e) {
        result.style.color = 'red';
        result.textContent = 'Error: ' + e.message;
    }
}

// loadTargets removed - add-tab no longer shows removable list

async function deleteTarget(address, btn) {
    try {
        btn.disabled = true;
        const res = await fetchWithKey('/api/targets/' + encodeURIComponent(address), { method: 'DELETE' });
        if (res.ok) {
            await loadStatus();
        } else {
            const txt = await res.text();
            alert('Failed to remove: ' + txt);
        }
    } catch (e) {
        alert('Error: ' + e.message);
    } finally { btn.disabled = false; }
}

// Simplified fetch helper (no API key required)
async function fetchWithKey(url, opts) {
    return fetch(url, opts);
}


</script>

</body>
</html>
